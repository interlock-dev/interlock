# Keep dependencies from rotting back into advisories.
# Groups minor+patch bumps into one PR per ecosystem to cut review noise;
# majors still arrive as their own PRs so breaking changes stay legible.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
